<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BV Assistant — Test Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; opacity: 0.6; }

    /* Settings bar */
    .settings {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 8px 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .settings label { font-size: 0.8rem; font-weight: 600; color: #555; }
    .settings select, .settings input {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 0.8rem;
    }

    /* Chat area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .msg.user .avatar { background: #1a1a2e; }
    .msg.bot  .avatar { background: #e8f4fd; }

    .bubble {
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .msg.user .bubble { background: #1a1a2e; color: #fff; border-bottom-right-radius: 4px; }
    .msg.bot  .bubble { background: #fff; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }

    /* Tags */
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .tag.analytique { background: #d1fae5; color: #065f46; }
    .tag.metier     { background: #dbeafe; color: #1e40af; }
    .tag.generale   { background: #f3e8ff; color: #6b21a8; }
    .tag.erreur     { background: #fee2e2; color: #991b1b; }

    /* SQL block */
    .sql-block {
      background: #1e1e2e;
      color: #a6e3a1;
      font-family: monospace;
      font-size: 0.78rem;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Table */
    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.82rem;
    }
    .result-table th {
      background: #f0f2f5;
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #e0e0e0;
    }
    .result-table td {
      padding: 5px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .result-table tr:last-child td { border-bottom: none; }

    /* Error */
    .error-msg { color: #dc2626; font-size: 0.85rem; }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #ccc;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Input area */
    .input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
    }
    #question-input {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
    }
    #question-input:focus { border-color: #1a1a2e; }
    #send-btn {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
    }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <span style="font-size:1.6rem">🤖</span>
  <div>
    <h1>BV Assistant</h1>
    <span>Pipeline multi-agents — test interface</span>
  </div>
</header>

<div class="settings">
  <label>Rôle :</label>
  <select id="role">
    <option value="ADMIN">ADMIN</option>
    <option value="STORE_MANAGER">STORE_MANAGER</option>
    <option value="MARKETING">MARKETING</option>
    <option value="ACHATS">ACHATS</option>
  </select>
  <label>Shop ID :</label>
  <input type="text" id="shop-id" placeholder="ex: BV551" style="width:100px" />
</div>

<div id="messages"></div>

<div class="input-area">
  <input type="text" id="question-input" placeholder="Posez votre question..." />
  <button id="send-btn" onclick="sendQuestion()">Envoyer</button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('question-input');
  const sendBtn    = document.getElementById('send-btn');

  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendQuestion(); });

  function appendMsg(role, html) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '🧑' : '🤖';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${html}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function tagHtml(intention) {
    if (!intention) return '';
    return `<span class="tag ${intention}">${intention}</span><br/>`;
  }

  function renderFormatted(fr, sql) {
    if (!fr && !sql) return '';
    let html = '';

    if (sql) {
      html += `<div class="sql-block">${escHtml(sql)}</div>`;
    }

    if (!fr) return html;

    if (fr.type === 'text') {
      html += `<div style="margin-top:8px">${escHtml(fr.content)}</div>`;

    } else if (fr.type === 'table') {
      const cols = fr.columns || [];
      const data = fr.data || [];
      html += `<div style="margin-top:8px;font-weight:600;font-size:.8rem;color:#555">${escHtml(fr.title || '')}</div>`;
      html += `<div style="overflow-x:auto"><table class="result-table"><thead><tr>`;
      cols.forEach(c => { html += `<th>${escHtml(c.label)}</th>`; });
      html += `</tr></thead><tbody>`;
      data.slice(0, 50).forEach(row => {
        html += '<tr>';
        cols.forEach(c => { html += `<td>${escHtml(String(row[c.field] ?? ''))}</td>`; });
        html += '</tr>';
      });
      if (data.length > 50) html += `<tr><td colspan="${cols.length}" style="color:#888;font-style:italic">… ${data.length - 50} lignes supplémentaires</td></tr>`;
      html += `</tbody></table></div>`;

    } else if (fr.type === 'chart') {
      html += `<div style="margin-top:8px;font-weight:600;font-size:.8rem;color:#555">${escHtml(fr.title || '')} — graphique ${fr.chartType}</div>`;
      html += renderBarChart(fr);
    }
    return html;
  }

  function renderBarChart(fr) {
    const data = (fr.data || []).slice(0, 20);
    if (!data.length) return '';
    const yField = fr.yAxis.field;
    const xField = fr.xAxis.field;
    const maxVal = Math.max(...data.map(d => Number(d[yField]) || 0));
    if (maxVal === 0) return '';

    let html = `<div style="margin-top:10px;display:flex;flex-direction:column;gap:4px">`;
    data.forEach(row => {
      const val = Number(row[yField]) || 0;
      const pct = Math.round((val / maxVal) * 100);
      html += `
        <div style="display:flex;align-items:center;gap:8px;font-size:.78rem">
          <div style="width:120px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#555">${escHtml(String(row[xField] ?? ''))}</div>
          <div style="flex:1;background:#f0f2f5;border-radius:4px;height:18px;position:relative">
            <div style="width:${pct}%;background:#1a1a2e;height:100%;border-radius:4px;transition:width .4s"></div>
          </div>
          <div style="width:60px;color:#333;font-weight:600">${val.toLocaleString('fr-FR')}</div>
        </div>`;
    });
    html += `</div>`;
    return html;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function sendQuestion() {
    const question = inputEl.value.trim();
    if (!question) return;

    const role    = document.getElementById('role').value;
    const shopId  = document.getElementById('shop-id').value.trim() || null;

    appendMsg('user', escHtml(question));
    inputEl.value = '';
    sendBtn.disabled = true;

    const loadingDiv = appendMsg('bot', '<span class="spinner"></span> Analyse en cours…');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, user_role: role, user_shop_id: shopId }),
      });
      const data = await res.json();

      let html = tagHtml(data.intention);

      if (data.execution_error) {
        html += `<span class="error-msg">❌ ${escHtml(data.execution_error)}</span>`;
      } else if (data.error) {
        html += `<span class="error-msg">❌ ${escHtml(data.error)}</span>`;
      } else {
        html += renderFormatted(data.formatted_response, data.sql_query);
      }

      if (!html.trim()) html = '<span style="color:#888">Aucune réponse générée.</span>';
      loadingDiv.querySelector('.bubble').innerHTML = html;

    } catch (err) {
      loadingDiv.querySelector('.bubble').innerHTML =
        `<span class="error-msg">❌ Erreur réseau : ${escHtml(err.message)}</span>`;
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
